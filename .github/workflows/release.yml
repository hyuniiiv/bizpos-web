name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        # .npmrc 의 node-linker=hoisted 가 pnpm 을 flat 설치로 강제한다.
        run: pnpm install --frozen-lockfile

      - name: Verify install is hoisted (diagnostic)
        shell: pwsh
        run: |
          Write-Host "=== node_modules/next 타입 (symlink 아니어야 함) ==="
          $item = Get-Item node_modules/next
          Write-Host "LinkType: $($item.LinkType)"
          Test-Path node_modules/next/package.json

      - name: Build Next.js + Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TERMINAL_JWT_SECRET: ${{ secrets.TERMINAL_JWT_SECRET }}
          INTERNAL_POS_KEY: ${{ secrets.INTERNAL_POS_KEY }}
          BIZPLAY_BASE_URL: ${{ secrets.BIZPLAY_BASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
        run: pnpm run electron:build:win --publish always

      - name: Diagnose standalone structure
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== .next/standalone 1-depth ==="
          if (Test-Path .next/standalone) {
            Get-ChildItem .next/standalone | Select-Object Name | Format-Table -AutoSize
          } else {
            Write-Host ".next/standalone 없음"
          }
          Write-Host "=== standalone/server.js 존재 ==="
          Test-Path .next/standalone/server.js
          Write-Host "=== standalone/node_modules/next/package.json 존재 ==="
          Test-Path .next/standalone/node_modules/next/package.json
          Write-Host "=== standalone/node_modules 상위 목록 ==="
          if (Test-Path .next/standalone/node_modules) {
            Get-ChildItem .next/standalone/node_modules | Select-Object Name | Format-Table -AutoSize
          }

      - name: Diagnose packaged output
        if: always()
        shell: pwsh
        run: |
          $base = "dist-electron/win-unpacked/resources/nextjs"
          if (Test-Path $base) {
            Write-Host "=== $base 1-depth ==="
            Get-ChildItem $base | Select-Object Name | Format-Table -AutoSize
            Write-Host "=== server.js 존재 ==="
            Test-Path "$base/server.js"
            Write-Host "=== node_modules/next/package.json 존재 ==="
            Test-Path "$base/node_modules/next/package.json"
          } else {
            Write-Host "$base 없음"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist-electron
          path: dist-electron/*.exe
          retention-days: 7
