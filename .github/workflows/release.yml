name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        # node-linker=hoisted: pnpm을 npm/yarn처럼 flat 설치로 강제
        # Next.js standalone은 pnpm의 심볼릭 링크 구조에서 node_modules를 제대로 패키징하지 못함
        # (standalone/node_modules/next 가 외부 .pnpm store를 가리키는 댕글링 링크가 됨)
        # hoisted 모드에서는 실제 파일이 복사되어 standalone이 진짜 self-contained 해진다.
        env:
          NPM_CONFIG_NODE_LINKER: hoisted
        run: pnpm install --frozen-lockfile

      - name: Build Next.js + Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # 운영 환경 변수 — GitHub Secrets에 등록 필요
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TERMINAL_JWT_SECRET: ${{ secrets.TERMINAL_JWT_SECRET }}
          INTERNAL_POS_KEY: ${{ secrets.INTERNAL_POS_KEY }}
          BIZPLAY_BASE_URL: ${{ secrets.BIZPLAY_BASE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
        run: pnpm run electron:build:win --publish always

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist-electron
          path: dist-electron/*.exe
          retention-days: 7
