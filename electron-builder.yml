appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# 패키징에 포함할 파일 (Next.js 런타임 제외 - extraResources로 별도 포함)
# electron-builder files 패턴은 뒤에 오는 패턴이 앞을 덮어씀.
# 따라서 먼저 전체 node_modules/** 를 제외한 뒤, 필요한 패키지만 명시적으로 포함.
# electron-updater 는 electron/main.js 에서 직접 require 하므로 asar 에 포함해야 함.
files:
  - electron/**
  - package.json
  - "!node_modules/**"
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"
  - node_modules/electron-updater/**
  - node_modules/builder-util-runtime/**
  - node_modules/debug/**
  - node_modules/ms/**
  - node_modules/fs-extra/**
  - node_modules/graceful-fs/**
  - node_modules/jsonfile/**
  - node_modules/universalify/**
  - node_modules/semver/**
  - node_modules/lazy-val/**

# Next.js standalone + 루트 node_modules를 조합해 resources/nextjs/ 에 self-contained 배치.
# standalone만으로는 pnpm 환경에서 node_modules/next 해석이 실패하는 사례가 발생해,
# 루트 node_modules를 nextjs/node_modules 로 그대로 복사해 require()를 보장한다.
# (.npmrc에 node-linker=hoisted 설정으로 flat 구조 강제, 심볼릭 링크 없음)
extraResources:
  # A/B 구조 어느 쪽이든 server.js + .next/ 를 nextjs/ 로 복사
  # 런타임에는 .next/ 컴파일 결과물만 필요하므로 원본 소스 폴더/설정 파일은 제외.
  - from: .next/standalone/bizpos-web
    to: nextjs
    filter:
      - "**/*"
      - "!app/**"
      - "!components/**"
      - "!lib/**"
      - "!types/**"
      - "!data/**"
      - "!docs/**"
      - "!supabase/**"
      - "!scripts/**"
      - "!electron/**"
      - "!public/**"
      - "!CC-Session-Logs/**"
      - "!*.md"
      - "!*.mjs"
      - "!*.ts"
      - "!tsconfig*.json"
      - "!package-lock.json"
      - "!pnpm-lock.yaml"
      - "!vercel.json"
      - "!.env*"
      - "!.gitignore"
      - "!.impeccable.md"
      - "!components.json"
      - "!electron-builder.yml"
      - "!next.config.ts"
  - from: .next/standalone
    to: nextjs
    filter:
      - "**/*"
      - "!bizpos-web/**"
  - from: .next/static
    to: nextjs/.next/static
    filter:
      - "**/*"
  - from: public
    to: nextjs/public
    filter:
      - "**/*"
  # 루트 node_modules를 직접 복사 (dev 전용 대형 패키지 + 런타임 불필요 텍스트 제외)
  - from: node_modules
    to: nextjs/node_modules
    filter:
      - "**/*"
      # dev 의존성 제외
      - "!electron/**"
      - "!electron-builder/**"
      - "!electron-builder-squirrel-windows/**"
      - "!electron-publish/**"
      - "!electron-publisher-*/**"
      - "!@electron/**"
      - "!app-builder-lib/**"
      - "!app-builder-bin/**"
      - "!dmg-builder/**"
      - "!builder-util/**"
      - "!builder-util-runtime/**"
      - "!@types/**"
      - "!typescript/**"
      - "!eslint/**"
      - "!@eslint/**"
      - "!eslint-*/**"
      - "!concurrently/**"
      - "!cross-env/**"
      - "!wait-on/**"
      - "!@babel/**"
      - "!babel-plugin-*/**"
      - "!prettier/**"
      - "!webpack/**"
      - "!jest/**"
      - "!ts-node/**"
      - "!vitest/**"
      - "!turborepo/**"
      # 런타임 불필요 파일
      - "!**/*.md"
      - "!**/*.markdown"
      - "!**/*.d.ts"
      - "!**/*.d.ts.map"
      - "!**/*.map"
      - "!**/*.ts.map"
      - "!**/*.js.map"
      - "!**/*.ts"
      - "!**/LICENSE*"
      - "!**/CHANGELOG*"
      - "!**/HISTORY*"
      - "!**/AUTHORS*"
      - "!**/CONTRIBUTORS*"
      - "!**/COPYING*"
      - "!**/.github/**"
      - "!**/.vscode/**"
      - "!**/.gitignore"
      - "!**/.npmignore"
      - "!**/.eslintignore"
      - "!**/test/**"
      - "!**/tests/**"
      - "!**/__tests__/**"
      - "!**/example/**"
      - "!**/examples/**"
      - "!**/docs/**"
      - "!**/doc/**"
      - "!**/demo/**"
      - "!**/samples/**"
      - "!**/src/**"
      - "!**/*.test.js"
      - "!**/*.spec.js"
      - "!**/*.test.ts"
      - "!**/*.spec.ts"
      - "!**/*.min.js.map"
      - "!**/.bin/**"
      - "!**/.pnpm/**"
      - "!**/Dockerfile*"
      - "!**/docker-compose*"
      - "!**/.git/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS
  deleteAppDataOnUninstall: false

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

# GitHub Releases 자동 배포 (GH_TOKEN 환경변수 필요)
publish:
  provider: github
  releaseType: release
