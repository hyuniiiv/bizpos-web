appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# 패키징에 포함할 파일 (Next.js 런타임 제외 - extraResources로 별도 포함)
files:
  - electron/**
  - package.json
  - "!node_modules/**"
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"

# Next.js standalone 빌드 결과물을 별도 리소스로 포함
# Next.js standalone 출력 경로는 환경에 따라 두 가지로 나뉨:
#   A) .next/standalone/bizpos-web/server.js  (pnpm workspace 등)
#   B) .next/standalone/server.js             (단일 패키지)
# 두 경우 모두 resources/nextjs/server.js 에 배치되도록 양쪽 모두 복사한다.
# 존재하지 않는 from 경로는 electron-builder가 skip 하므로 양쪽 선언이 안전하다.
extraResources:
  # A 구조: bizpos-web 하위를 nextjs로 평탄화
  - from: .next/standalone/bizpos-web
    to: nextjs
    filter:
      - "**/*"
  # B 구조: standalone 루트를 nextjs로 (bizpos-web 폴더는 A에서 이미 처리)
  - from: .next/standalone
    to: nextjs
    filter:
      - "**/*"
      - "!bizpos-web/**"
  - from: .next/static
    to: nextjs/.next/static
    filter:
      - "**/*"
  - from: public
    to: nextjs/public
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

# GitHub Releases 자동 배포 (GH_TOKEN 환경변수 필요)
publish:
  provider: github
  releaseType: release
