appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# 패키징에 포함할 파일 (Next.js 런타임 제외 - extraResources로 별도 포함)
files:
  - electron/**
  - package.json
  - "!node_modules/**"
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"

# Next.js standalone + 루트 node_modules를 조합해 resources/nextjs/ 에 self-contained 배치.
# standalone만으로는 pnpm 환경에서 node_modules/next 해석이 실패하는 사례가 발생해,
# 루트 node_modules를 nextjs/node_modules 로 그대로 복사해 require()를 보장한다.
# (.npmrc에 node-linker=hoisted 설정으로 flat 구조 강제, 심볼릭 링크 없음)
extraResources:
  # A/B 구조 어느 쪽이든 server.js + .next/ 를 nextjs/ 로 복사
  - from: .next/standalone/bizpos-web
    to: nextjs
    filter:
      - "**/*"
  - from: .next/standalone
    to: nextjs
    filter:
      - "**/*"
      - "!bizpos-web/**"
  - from: .next/static
    to: nextjs/.next/static
    filter:
      - "**/*"
  - from: public
    to: nextjs/public
    filter:
      - "**/*"
  # 루트 node_modules를 직접 복사 (dev 전용 대형 패키지 제외)
  - from: node_modules
    to: nextjs/node_modules
    filter:
      - "**/*"
      - "!electron/**"
      - "!electron-builder/**"
      - "!electron-builder-squirrel-windows/**"
      - "!electron-publish/**"
      - "!electron-publisher-*/**"
      - "!@electron/**"
      - "!app-builder-lib/**"
      - "!app-builder-bin/**"
      - "!dmg-builder/**"
      - "!builder-util/**"
      - "!builder-util-runtime/**"
      - "!@types/**"
      - "!typescript/**"
      - "!eslint/**"
      - "!@eslint/**"
      - "!eslint-*/**"
      - "!concurrently/**"
      - "!cross-env/**"
      - "!wait-on/**"
      - "!@babel/**"
      - "!babel-plugin-*/**"
      - "!**/*.md"
      - "!**/*.d.ts"
      - "!**/test/**"
      - "!**/tests/**"
      - "!**/__tests__/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

# GitHub Releases 자동 배포 (GH_TOKEN 환경변수 필요)
publish:
  provider: github
  releaseType: release
