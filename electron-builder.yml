appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# electron-builder 기본 동작:
#   - package.json의 dependencies 전체 및 transitive deps를 자동 포함
#   - devDependencies는 자동 제외
# 수동으로 node_modules를 필터링하면 transitive dep 누락 사고가 반복됨(v0.1.11~25).
# 소스 파일만 제외하고 node_modules는 electron-builder에게 맡긴다.
files:
  - electron/**
  - package.json
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"
  - "!CC-Session-Logs/**"
  - "!docs/**"
  - "!supabase/**"
  - "!.github/**"
  - "!scripts/**"
  - "!types/**"
  - "!data/**"
  - "!*.md"
  - "!*.ts"
  - "!*.mjs"
  - "!tsconfig*.json"
  - "!next.config.*"
  - "!components.json"
  - "!.env*"
  - "!eslint.config.*"
  - "!postcss.config.*"
  - "!middleware.ts"

# 네이티브 C++ 모듈은 asar 압축 해제 필수.
# require()가 .node 파일을 직접 로드해야 하는데 asar 내부에서는 불가능.
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**

# Next.js standalone 런타임은 별도 경로(resources/nextjs/)로 복사.
# standalone 번들은 자체 node_modules를 포함하므로 Next.js 런타임 deps는 여기서 완결.
extraResources:
  - from: .next/standalone/bizpos-web
    to: nextjs
    filter:
      - "**/*"
      - "!node_modules/**"
      - "!app/**"
      - "!components/**"
      - "!lib/**"
      - "!types/**"
      - "!data/**"
      - "!docs/**"
      - "!supabase/**"
      - "!scripts/**"
      - "!electron/**"
      - "!public/**"
      - "!CC-Session-Logs/**"
      - "!*.md"
      - "!*.mjs"
      - "!*.ts"
      - "!tsconfig*.json"
      - "!package-lock.json"
      - "!pnpm-lock.yaml"
      - "!vercel.json"
      - "!.env*"
      - "!.gitignore"
      - "!.impeccable.md"
      - "!components.json"
      - "!electron-builder.yml"
      - "!next.config.ts"
  - from: .next/standalone
    to: nextjs
    filter:
      - "**/*"
      - "!bizpos-web/**"
  - from: .next/static
    to: nextjs/.next/static
    filter:
      - "**/*"
  - from: public
    to: nextjs/public
    filter:
      - "**/*"
  - from: .next/standalone/bizpos-web/node_modules
    to: nextjs/node_modules
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS
  deleteAppDataOnUninstall: false

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

publish:
  provider: github
  releaseType: release
