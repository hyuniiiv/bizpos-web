appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# electron-builder 기본 동작으로 dependencies 자동 포함.
# 수동 allowlist는 transitive deps 누락 사고 반복 (v0.1.11~25).
files:
  - electron/**
  - package.json
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"
  - "!CC-Session-Logs/**"
  - "!docs/**"
  - "!supabase/**"
  - "!.github/**"
  - "!scripts/**"
  - "!types/**"
  - "!data/**"
  - "!*.md"
  - "!*.ts"
  - "!*.mjs"
  - "!tsconfig*.json"
  - "!next.config.*"
  - "!components.json"
  - "!.env*"
  - "!eslint.config.*"
  - "!postcss.config.*"
  - "!middleware.ts"

# 네이티브 C++ 모듈은 asar 압축 해제 필수.
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**

# Next.js standalone 구조는 workspace 감지 여부에 따라 달라짐:
#   - CI (단일 lockfile): .next/standalone/server.js, .next/standalone/node_modules/...
#   - 로컬 (상위 lockfile 존재): .next/standalone/bizpos-web/server.js, ...
# CI 구조 기준으로 flat 복사. 로컬에서는 CI로만 배포하므로 문제없음.
extraResources:
  - from: .next/standalone
    to: nextjs
    filter:
      - "**/*"
  - from: .next/static
    to: nextjs/.next/static
    filter:
      - "**/*"
  - from: public
    to: nextjs/public
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS
  deleteAppDataOnUninstall: false

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

publish:
  provider: github
  releaseType: release
