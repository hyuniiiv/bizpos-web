appId: com.bizpos.pos
productName: BIZPOS
copyright: Copyright © 2025 BIZPOS

directories:
  buildResources: resources
  output: dist-electron

# electron-builder 기본 동작: package.json dependencies 자동 포함.
# Electron main process가 require하는 런타임 의존성만 필요:
#   - better-sqlite3 (네이티브)
#   - electron-updater
files:
  - electron/**
  - package.json
  - "!src/**"
  - "!app/**"
  - "!components/**"
  - "!lib/**"
  - "!public/**"
  - "!.next/**"
  - "!out/**"
  - "!CC-Session-Logs/**"
  - "!docs/**"
  - "!supabase/**"
  - "!.github/**"
  - "!scripts/**"
  - "!types/**"
  - "!data/**"
  - "!*.md"
  - "!*.ts"
  - "!*.mjs"
  - "!tsconfig*.json"
  - "!next.config.*"
  - "!components.json"
  - "!.env*"
  - "!eslint.config.*"
  - "!postcss.config.*"

# 네이티브 C++ 모듈은 asar 해제 필수
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/bindings/**
  - node_modules/file-uri-to-path/**

# Next.js static export 결과(out/ 폴더)를 resources/nextjs/로 복사
# 서버 없음 → Electron이 file:// 로 index.html 로드
extraResources:
  - from: out
    to: nextjs
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: bizpos-setup-${version}.exe
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko
  language: "1042"
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: BIZPOS
  deleteAppDataOnUninstall: false

mac:
  target: dmg
  artifactName: bizpos-${version}.dmg
  icon: resources/icon.icns

linux:
  target: AppImage
  artifactName: bizpos-${version}.AppImage

publish:
  provider: github
  releaseType: release
